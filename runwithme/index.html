<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RunWithMe — A private fitness journey app for couples. Track walks, jogs, and runs together.">
  <meta name="theme-color" content="#7C3AED">

  <title>RunWithMe — Every Step Together ❤️</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️‍🔥</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- SPA Root -->
  <div id="app">
    <!-- Content injected by JavaScript -->
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;font-family:sans-serif;color:#F5F3FF;background:#08081A">
        <div>
          <div style="font-size:3rem;margin-bottom:1rem">❤️‍🔥</div>
          <h1 style="margin-bottom:0.5rem">RunWithMe</h1>
          <p>JavaScript is required to run this app. Please enable it in your browser.</p>
        </div>
      </div>
    </noscript>
  </div>

  <!-- App Entry Point (ES Module) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
